<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVENT INVITATION & RSVP</title>
    <style>
        /* Your existing styles + new styles for the register button */
        .contact-section {
            padding: 2rem;
            max-width: 100%;
            margin: 0 auto;
            text-align: left;
            display: block !important;
        }
        .contact-section form {
            max-width: 600px;
            margin: 1em auto 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0.7em;
        }
        .contact-section p {
            text-align: left;
            max-width: 600px;
            margin: 0 auto 1em auto;
        }
        .navbar {
            justify-content: center;
            position: relative;
        }
        .navbar-brand {
            position: absolute;
            left: 2rem;
            margin: 0;
        }
        .navbar-links {
            margin: 0;
            justify-content: center;
        }

        /* Join Us Section Styles */
        .join-us-section {
            text-align: center;
            padding: 3rem 1rem;
            background: rgba(255,255,255,0.95);
            margin: 2.5rem auto;
            max-width: 700px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-register {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            font-size: 1.1rem;
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }
        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #c3e6cb;
            font-weight: bold;
            margin-top: 1rem;
            display: none;
        }

        @media (max-width: 768px) {
            .contact-section { padding: 1rem; }
            .navbar-brand { position: static; left: auto; }
            .navbar { flex-direction: column; gap: 1rem; }
        }

        /* Auth Modal Styles (your existing styles) */
        .auth-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .auth-modal-overlay.active { display: flex; }
        .auth-section {
            background: white; padding: 2rem; border-radius: 8px;
            max-width: 400px; width: 90%; position: relative;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .auth-modal-close {
            position: absolute; top: 1rem; right: 1rem;
            background: none; border: none; font-size: 1.5rem;
            cursor: pointer; color: #666;
        }
        /* ... (keeping all your other styles) */
    </style>
</head>
<body>
  <div class="universe" aria-hidden="true">
    <div class="stars"></div>
    <div class="sun"></div>
    <div class="orbit"><div class="earth"></div></div>
  </div>

  <nav class="navbar">
    <div class="navbar-brand">Event RSVP</div>
    <ul class="navbar-links">
      <li><a href="#events" class="nav-link nav-home active">Home</a></li>
      <li><a href="#about" class="nav-link nav-about">About</a></li>
      <li><a href="#contact" class="nav-link nav-contact">Contact</a></li>
      <li><a href="#login" class="nav-link nav-login">Login / Register</a></li>
    </ul>
  </nav>

  <main class="main-content">
    <section class="event-cards" id="events">
      <!-- Your existing event cards remain unchanged -->
      <div class="event-card" data-event="culture"> ... </div>
      <div class="event-card" data-event="worship"> ... </div>
      <div class="event-card virtual-event" data-event="virtual-worship"> ... </div>
      <div class="event-card" data-event="tech"> ... </div>
      <div class="event-card virtual-event" data-event="virtual-tech"> ... </div>
      <div class="event-card virtual-event" data-event="virtual-culture"> ... </div>
    </section>

    <!-- ✅ Register Now Button Added Here -->
    <div class="join-us-section">
        <h2>Join Us Today</h2>
        <p>Click the button below to create your account and get started.</p>
        <button id="registerBtn" class="btn-register">Register Now</button>
        <div id="successAlert" class="success-message">
            🎉 Account successfully registered!
        </div>
    </div>

    <!-- Rest of your modals and sections -->
    <div class="rsvp-modal-overlay" id="rsvp-modal"> ... </div>

    <!-- Auth Modal -->
    <div class="auth-modal-overlay" id="auth-modal"> ... </div>

    <section class="about-section" id="about" style="display:none;"> ... </section>
    <section class="contact-section" id="contact" style="display:none;"> ... </section>
  </main>

  <!-- Google Identity Services Script -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    // Your existing script code here...

    // Added: Register Button Functionality
    document.getElementById('registerBtn').addEventListener('click', function() {
        document.getElementById('auth-modal').classList.add('active');
        document.querySelector('.tab-btn[data-tab="register"]').click();
    });
  </script>
</body>
</html>
