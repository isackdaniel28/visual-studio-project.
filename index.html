<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVENT INVITATION & RSVP</title>
    
    <!-- Link to CSS -->
    <link rel="stylesheet" href="index.css">
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Universe Background -->
  <div class="universe" aria-hidden="true">
    <div class="stars"></div>
    <div class="sun"></div>
    <div class="orbit"><div class="earth"></div></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">Event RSVP</div>
    <ul class="navbar-links">
      <li><a href="#events" class="nav-link nav-home active">Home</a></li>
      <li><a href="#about" class="nav-link nav-about">About</a></li>
      <li><a href="#contact" class="nav-link nav-contact">Contact</a></li>
      <li><a href="#login" class="nav-link nav-login">Login / Register</a></li>
    </ul>
  </nav>

  <main class="main-content">
    <!-- Events Section -->
    <section class="event-cards" id="events">
      <!-- Paste your full event cards here (example below) -->
      <div class="event-card" data-event="culture">
        <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?ixlib=rb-4.0.3&w=100&h=100&fit=crop&q=80" alt="Culture">
        <h2>Culture Gala 2026</h2>
        <p><strong>Date:</strong> October 8, 2026<br><strong>Time:</strong> 7:00 PM - 11:00 PM</p>
        <button class="book-btn">Book</button>
      </div>
      <!-- Add all your other event cards here -->
    </section>

    <!-- Join Us Today -->
    <div class="join-us-section">
        <h2>Join Us Today</h2>
        <p>Click the button below to create your account and get started.</p>
        <button id="registerBtn" class="btn-register">Register Now</button>
        <div id="successAlert" class="success-message">
            🎉 Account successfully registered!
        </div>
    </div>

    <!-- Modals -->
    <div class="rsvp-modal-overlay" id="rsvp-modal">...</div>
    <div class="auth-modal-overlay" id="auth-modal">...</div>

    <!-- About & Contact -->
    <section class="about-section" id="about" style="display:none;">...</section>
    <section class="contact-section" id="contact" style="display:none;">...</section>
  </main>

  <!-- Link to JavaScript -->
  <script src="script.js"></script>
</body>
</html>
